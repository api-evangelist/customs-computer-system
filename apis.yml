aid: customs-computer-system
name: Customs Computer System
x-type: topic
description: >-
  A customs computer system is the national IT platform that customs
  authorities operate to manage the import and export of goods, collect
  duties and taxes, enforce trade restrictions, and exchange information
  with traders, brokers, carriers, and Partner Government Agencies.
  Examples include the U.S. Automated Commercial Environment (ACE), the
  EU's Import Control System 2 (ICS2) and Automated Export System (AES),
  the UK's Customs Declaration Service (CDS), Canada's CARM, Singapore's
  TradeNet, and Japan's NACCS. Most national systems are integrated
  Single Window environments aligned with the WCO SAFE Framework and the
  WCO Data Model, predominantly accessed by trade through Electronic Data
  Interchange (EDI / XML / EDIFACT) rather than through public REST APIs.
